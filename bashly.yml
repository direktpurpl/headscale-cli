name: hscli
help: "CLI-утилита для управления Headscale v0.28.0"
version: "0.1.0"

args:
- name: command
  required: true
  help: "Подкоманда (users, tags, nodes, routes, keys)"

env:
- name: HEADSCALE_CONTAINER
  help: "Имя Docker-контейнера Headscale"
  default: "headscale"
- name: HEADSCALE_NAMESPACE
  help: "Namespace для фильтрации (опционально)"

commands:
- name: users
  alias: u
  help: "Управление пользователями (users)"
  commands:
  - name: list
    alias: ls
    help: "Показать список пользователей"
  - name: add
    help: "Добавить нового пользователя"
    args:
    - name: name
      required: true
      help: "Имя пользователя"
  - name: delete
    alias: rm
    help: "Удалить пользователя"
    args:
    - name: name
      required: true
      help: "Имя пользователя"
  - name: rename
    help: "Переименовать пользователя"
    args:
    - name: old_name
      required: true
      help: "Текущее имя"
    - name: new_name
      required: true
      help: "Новое имя"

- name: tags
  alias: t
  help: "Управление ACL тегами"
  commands:
  - name: list
    alias: ls
    help: "Показать список тегов узла"
    args:
    - name: node
      required: false
      help: "ID или имя узла (опционально)"
  - name: set
    help: "Установить теги для узла"
    args:
    - name: node
      required: true
      help: "ID или имя узла"
    - name: tags
      required: true
      help: "Список тегов через запятую (tag:foo,tag:bar)"
  - name: delete
    alias: rm
    help: "Удалить теги у узла"
    args:
    - name: node
      required: true
      help: "ID или имя узла"

- name: nodes
  alias: n
  help: "Управление узлами (machines)"
  commands:
  - name: list
    alias: ls
    help: "Показать список узлов"
  - name: get
    help: "Получить информацию об узле"
    args:
    - name: node
      required: true
      help: "ID или имя узла"
  - name: delete
    alias: rm
    help: "Удалить узел"
    args:
    - name: node
      required: true
      help: "ID или имя узла"
  - name: move
    help: "Переместить узел в другой namespace"
    args:
    - name: node
      required: true
      help: "ID или имя узла"
    - name: namespace
      required: true
      help: "Целевой namespace"
  - name: expire
    help: "Истечь срок действия ключа узла"
    args:
    - name: node
      required: true
      help: "ID или имя узла"
  - name: rename
    help: "Переименовать узел"
    args:
    - name: node
      required: true
      help: "Текущее имя/ID узла"
    - name: new_name
      required: true
      help: "Новое имя узла"

- name: routes
  alias: r
  help: "Управление маршрутами"
  commands:
  - name: list
    alias: ls
    help: "Показать все маршруты"
  - name: get
    help: "Получить информацию о маршруте"
    args:
    - name: route
      required: true
      help: "ID маршрута"
  - name: enable
    help: "Включить маршрут"
    args:
    - name: route
      required: true
      help: "ID маршрута"
  - name: disable
    help: "Отключить маршрут"
    args:
    - name: route
      required: true
      help: "ID маршрута"
  - name: delete
    alias: rm
    help: "Удалить маршрут"
    args:
    - name: route
      required: true
      help: "ID маршрута"

- name: keys
  alias: k
  help: "Управление ключами (API keys, pre-auth keys)"
  commands:
  - name: api-list
    alias: api-ls
    help: "Показать API ключи"
  - name: api-create
    help: "Создать API ключ"
    args:
    - name: expiration
      required: false
      help: "Срок действия (например 90d, 180d, 365d)"
  - name: api-delete
    help: "Отозвать API ключ"
    args:
    - name: key
      required: true
      help: "Префикс или ID API ключа"
  - name: preauth-list
    alias: preauth-ls
    help: "Показать pre-auth ключи"
    args:
    - name: namespace
      required: false
      help: "Фильтр по namespace"
  - name: preauth-create
    help: "Создать pre-auth ключ"
    args:
    - name: namespace
      required: true
      help: "Namespace для ключа"
    - name: reusable
      required: false
      help: "Многоразовый ключ (true/false)"
      default: "false"
    - name: ephemeral
      required: false
      help: "Эфемерный ключ (true/false)"
      default: "false"
    - name: expiration
      required: false
      help: "Срок действия (например 30m, 24h, 90d)"
  - name: preauth-delete
    help: "Удалить pre-auth ключ"
    args:
    - name: namespace
      required: true
      help: "Namespace ключа"
    - name: key
      required: true
      help: "ID или префикс pre-auth ключа"

- name: namespaces
  alias: ns
  help: "Управление namespaces"
  commands:
  - name: list
    alias: ls
    help: "Показать namespaces"
  - name: create
    help: "Создать namespace"
    args:
    - name: name
      required: true
      help: "Имя namespace"
  - name: delete
    alias: rm
    help: "Удалить namespace"
    args:
    - name: name
      required: true
      help: "Имя namespace"
  - name: rename
    help: "Переименовать namespace"
    args:
    - name: old_name
      required: true
      help: "Текущее имя"
    - name: new_name
      required: true
      help: "Новое имя"
