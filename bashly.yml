name: hscli
help: "CLI-утилита для управления Headscale v0.23.0+"
version: "0.2.0"

env:
- name: HEADSCALE_CONTAINER
  help: "Имя Docker-контейнера Headscale"
  default: "headscale"

commands:
- name: users
  alias: u
  help: "Управление пользователями"
  commands:
  - name: list
    alias: ls
    help: "Показать список пользователей"
  - name: create
    alias: add
    help: "Добавить нового пользователя"
    args:
    - name: name
      required: true
      help: "Имя пользователя"
  - name: destroy
    alias: rm
    help: "Удалить пользователя"
    args:
    - name: name
      required: true
      help: "Имя пользователя"
  - name: rename
    help: "Переименовать пользователя"
    args:
    - name: old_name
      required: true
      help: "Текущее имя"
    - name: new_name
      required: true
      help: "Новое имя"

- name: nodes
  alias: n
  help: "Управление узлами"
  commands:
  - name: list
    alias: ls
    help: "Показать список узлов"
  - name: register
    help: "Зарегистрировать новый узел"
    flags:
    - long: --key
      short: -k
      arg: key
      required: true
    - long: --user
      short: -u
      arg: user
      required: true
  - name: delete
    alias: rm
    help: "Удалить узел"
    flags:
    - long: --identifier
      short: -i
      arg: id
      required: true
      help: "ID узла"
  - name: rename
    help: "Переименовать узел"
    args:
    - name: new_name
      required: true
      help: "Новое имя узла"
    flags:
    - long: --identifier
      short: -i
      arg: id
      required: true
      help: "ID узла"
  - name: expire
    help: "Истечь срок действия ключа узла"
    flags:
    - long: --identifier
      short: -i
      arg: id
      required: true
  - name: tag
    help: "Установить теги для узла"
    flags:
    - long: --identifier
      short: -i
      arg: id
      required: true
    - long: --tags
      short: -t
      arg: tags
      required: true
      help: "Список тегов через запятую"

- name: routes
  alias: r
  help: "Управление маршрутами"
  commands:
  - name: list
    alias: ls
    help: "Показать все маршруты"
  - name: enable
    help: "Включить маршрут"
    flags:
    - long: --route-id
      short: -r
      arg: id
      required: true
  - name: disable
    help: "Отключить маршрут"
    flags:
    - long: --route-id
      short: -r
      arg: id
      required: true
  - name: delete
    alias: rm
    help: "Удалить маршрут"
    flags:
    - long: --route-id
      short: -r
      arg: id
      required: true

- name: keys
  alias: k
  help: "Управление ключами"
  commands:
  - name: api-list
    alias: api-ls
    help: "Показать API ключи"
  - name: api-create
    help: "Создать API ключ"
    flags:
    - long: --expiration
      short: -e
      arg: exp
  - name: api-delete
    help: "Отозвать API ключ"
    flags:
    - long: --prefix
      short: -p
      arg: prefix
      required: true
  - name: preauth-list
    alias: preauth-ls
    help: "Показать pre-auth ключи"
  - name: preauth-create
    help: "Создать pre-auth ключ"
    flags:
    - long: --user
      short: -u
      arg: user
      required: true
    - long: --reusable
      short: -r
      type: bool
    - long: --ephemeral
      short: -e
      type: bool
    - long: --expiration
      short: -x
      arg: exp
  - name: preauth-delete
    help: "Удалить pre-auth ключ"
    flags:
    - long: --id
      short: -i
      arg: id
      required: true
